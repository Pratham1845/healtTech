<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test</title>
</head>
<body>
    <h1>Backend Connection Test</h1>
    <button onclick="testBackend()">Test Backend Connection</button>
    <button onclick="testLogin()">Test Login API</button>
    <pre id="output"></pre>

    <script>
        const output = document.getElementById('output');
        const API_URL = 'http://localhost:5000';

        function log(message) {
            output.textContent += message + '\n';
            console.log(message);
        }

        async function testBackend() {
            output.textContent = '';
            try {
                log('Testing backend connection...');
                const response = await fetch(`${API_URL}/`);
                const data = await response.json();
                log(`✅ Backend is running: ${JSON.stringify(data)}`);
            } catch (error) {
                log(`❌ Backend connection failed: ${error.message}`);
            }
        }

        async function testLogin() {
            output.textContent = '';
            try {
                log('Testing login API...');
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'demo@zenith.com',
                        password: 'demo123'
                    })
                });

                log(`Response status: ${response.status}`);
                const data = await response.json();
                
                if (response.ok) {
                    log(`✅ Login successful: ${JSON.stringify(data, null, 2)}`);
                } else {
                    log(`❌ Login failed: ${data.message || data.error}`);
                }
            } catch (error) {
                log(`❌ Login request failed: ${error.message}`);
                log(`Error type: ${error.constructor.name}`);
            }
        }
    </script>
</body>
</html>
