<!DOCTYPE html>
<html>
<head>
    <title>Gemini API Test</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        .result { padding: 15px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; border: 1px solid #28a745; }
        .error { background: #f8d7da; border: 1px solid #dc3545; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        textarea { width: 100%; height: 100px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Gemini API Key Tester</h1>
    
    <h2>Your API Key:</h2>
    <input type="text" id="apiKey" value="AIzaSyAdaEcJGYVhpsOZ5lNAxuubfl3SebOcBGY" style="width: 100%; padding: 8px;">
    
    <h2>Test Message:</h2>
    <textarea id="message">Hello, how are you?</textarea>
    
    <button onclick="testAPI()">Test API Key</button>
    <button onclick="checkQuota()">Check Quota Status</button>
    
    <div id="results"></div>
    
    <script>
        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = 'result ' + (type === 'success' ? 'success' : 'error');
            div.innerHTML = message;
            document.getElementById('results').appendChild(div);
        }
        
        async function testAPI() {
            document.getElementById('results').innerHTML = '';
            const apiKey = document.getElementById('apiKey').value.trim();
            const message = document.getElementById('message').value.trim();
            
            if (!apiKey) {
                log('❌ Please enter your API key', 'error');
                return;
            }
            
            log('🔄 Testing API...');
            
            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                role: 'user',
                                parts: [{ text: message }]
                            }],
                            generationConfig: {
                                temperature: 0.5,
                                maxOutputTokens: 220
                            }
                        })
                    }
                );
                
                log(`📡 Response Status: ${response.status} ${response.statusText}`);
                
                const data = await response.json();
                
                if (response.ok && data.candidates) {
                    const reply = data.candidates[0].content.parts[0].text;
                    log(`✅✅✅ SUCCESS! API is working! ✅✅✅<br><br><strong>AI Response:</strong><br>${reply}`, 'success');
                    log(`Usage metadata: ${JSON.stringify(data.usageMetadata, null, 2)}`, 'success');
                } else if (data.error) {
                    log(`❌ Error: ${data.error.message}`, 'error');
                    log(`Status: ${data.error.status}`, 'error');
                    log(`Code: ${data.error.code}`, 'error');
                    
                    if (data.error.code === 429) {
                        log(`<br><strong>QUOTA EXCEEDED!</strong><br>
                            Your API key has run out of free tier quota.<br><br>
                            <strong>Solutions:</strong><br>
                            1. Get a new API key from: <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a><br>
                            2. Wait 24 hours for quota reset<br>
                            3. Enable billing on Google Cloud`, 'error');
                    } else if (data.error.code === 401 || data.error.code === 403) {
                        log(`<br><strong>INVALID API KEY!</strong><br>
                            Your API key is invalid or restricted.<br><br>
                            <strong>Solution:</strong> Get a new API key from: 
                            <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>`, 'error');
                    }
                } else {
                    log(`❌ Unexpected response: ${JSON.stringify(data, null, 2)}`, 'error');
                }
            } catch (error) {
                log(`❌ Network Error: ${error.message}`, 'error');
            }
        }
        
        async function checkQuota() {
            document.getElementById('results').innerHTML = '';
            const apiKey = document.getElementById('apiKey').value.trim();
            
            log('🔄 Checking API key validity...');
            
            // Try a minimal request
            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ role: 'user', parts: [{ text: 'test' }] }],
                            generationConfig: { maxOutputTokens: 5 }
                        })
                    }
                );
                
                if (response.status === 200) {
                    log('✅ API Key is VALID and has quota!', 'success');
                } else if (response.status === 429) {
                    log('❌ API Key is VALID but QUOTA EXCEEDED', 'error');
                    log('The key works, but youve used up your free tier limit', 'error');
                } else if (response.status === 401 || response.status === 403) {
                    log('❌ API Key is INVALID or RESTRICTED', 'error');
                } else {
                    log(`❓ Unexpected status: ${response.status}`, 'error');
                }
            } catch (error) {
                log(`❌ Network error: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
